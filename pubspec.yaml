name: lifehub
description: "Aplikasi Manajemen Pribadi - Notes, Finance, Tasks"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # UI
  google_fonts: ^8.1.0
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1

  # Utilities
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Export & Sharing
  share_plus: ^9.0.0
  csv: ^6.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Biometrics
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: 2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - lib/resources/bg-1.jpg
